services:
  - type: web
    name: cryptvault-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: AUDIT_HMAC_SECRET
        generateValue: true
      - key: ENCRYPTION_KEYS
        sync: false
      - key: ACTIVE_KEY_ID
        value: v1
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.11"
