services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: securevault
      POSTGRES_USER: securevault
      POSTGRES_PASSWORD: securevault
    ports:
      - "5432:5432"
    volumes:
      - securevault_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securevault -d securevault"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  securevault_pg:
