{% extends "base.html" %}

{% block title %}Login | SecureVault{% endblock %}

{% block content %}
  <section class="auth-shell">
    <div class="auth-card">
      <div class="auth-heading">
        <p class="eyebrow">Encrypted File Vault</p>
        <h1>Login</h1>
      </div>
      <form method="post" action="{{ url_for('login') }}" class="vault-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input
            type="text"
            class="form-control vault-input"
            id="username"
            name="username"
            value="{{ username or '' }}"
            autocomplete="username"
            required
          >
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control vault-input"
            id="password"
            name="password"
            autocomplete="current-password"
            required
          >
        </div>
        <button type="submit" class="btn btn-aqua w-100">Login</button>
      </form>
      <p class="auth-switch">
        Need an account?
        <a href="{{ url_for('register') }}">Register</a>
      </p>
    </div>
  </section>
{% endblock %}
